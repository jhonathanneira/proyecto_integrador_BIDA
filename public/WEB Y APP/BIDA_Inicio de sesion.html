<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imagen de fondo</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background-image: url('assets/Fondo BIDA.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .form-container {
      text-align: center;
      background-color: rgba(255, 255, 255, 0.8); /* Fondo semi-transparente para mejor legibilidad */
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

  </style>
    
</head>
<body>
  
    <link rel="stylesheet" href="imagenes.css">
    <link rel="stylesheet" href="textos.css">
    <link rel="stylesheet" href="botones.css">

    <h1 class="titulo-movible">ODONTOLOGÍA<br>ESPECIALIZADA</h1>
    
    <img src="assets/logo-500x500.png" alt="Logo BIDA" class="logo-small">
    
    <div class="form-container">
    <form id="loginForm">
        <label for="username">Usuario o Email:</label>
        <input type="text" id="username" name="username" required><br><br>

        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" required><br><br>

        <button type="submit" class="boton">Iniciar Sesión</button>
    </form>
    </div>
    
    <script src="BIDA_Inicio de sesion.js"></script>

    



    



</body>
