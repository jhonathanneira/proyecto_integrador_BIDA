<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imagen de fondo</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background-image: url('assets/Fondo BIDA.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .form-container {
      text-align: center;
      background-color: rgba(255, 255, 255, 0.8); /* Fondo semi-transparente para mejor legibilidad */
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

  </style>
    
</head>
<body>
  
    <link rel="stylesheet" href="imagenes.css">
    <link rel="stylesheet" href="textos.css">
    <link rel="stylesheet" href="botones.css">

    <h1 class="titulo-movible">ODONTOLOGÍA<br>ESPECIALIZADA</h1>
    <img src="assets/logo-500x500.png" alt="Logo BIDA" class="logo-small">

    <div class="form-container">
        <form id="registroForm">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required><br><br>

            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono" required><br><br>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required><br><br>

            <label for="confirmPassword">Confirmar Contraseña:</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required><br><br>

            <button type="submit" class="boton boton-registro">Registrarse</button>
        </form>
    </div>

    <script src="BIDA_registro.js"></script>


    



</body
