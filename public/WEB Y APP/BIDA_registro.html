<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Imagen de fondo</title>
  <style>
    body.registro-page {
      margin: 0;
      min-height: 100vh;
      padding: 160px 16px 24px;
      box-sizing: border-box;
      background-image: url('assets/Fondo BIDA.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      gap: 18px;
      overflow-y: auto;
    }

    body.registro-page .form-container {
      text-align: center;
      background-color: rgba(255, 255, 255, 0.8); /* Fondo semi-transparente para mejor legibilidad */
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      width: min(100%, 420px);
      box-sizing: border-box;
    }

    body.registro-page form {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
    }

    body.registro-page .form-container label {
      text-align: left;
      margin-bottom: 0;
    }

    body.registro-page .form-container input,
    body.registro-page .form-container button {
      width: 100%;
      max-width: 100%;
    }

    body.registro-page .form-container input {
      margin-bottom: 0;
    }

    @media (max-width: 900px) {
      body.registro-page {
        padding-top: 8px;
        gap: 12px;
      }

      body.registro-page .titulo-movible {
        position: static;
        top: auto;
        left: auto;
        margin: 0;
        font-size: 1.35rem;
        line-height: 1.1;
      }

      body.registro-page .logo-small {
        position: static;
        max-width: 90px;
        width: 24vw;
      }

      body.registro-page h1 {
        margin: 0;
      }

      body.registro-page .form-container {
        padding: 14px;
      }

      body.registro-page label {
        font-size: 1.1rem;
      }

      body.registro-page input[type="text"],
      body.registro-page input[type="password"],
      body.registro-page input[type="email"],
      body.registro-page input[type="tel"],
      body.registro-page .boton {
        font-size: 1rem;
        padding: 12px;
      }
    }

  </style>
    
</head>
<body class="registro-page">
  
    <link rel="stylesheet" href="imagenes.css">
    <link rel="stylesheet" href="textos.css">
    <link rel="stylesheet" href="botones.css">

    <img src="assets/logo-500x500.png" alt="Logo BIDA" class="logo-small">
    <h1 class="titulo-movible">ODONTOLOGÍA<br>ESPECIALIZADA</h1>

    <div class="form-container">
        <form id="registroForm">
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" name="nombre" required>

            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" name="apellido" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono" required>

            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required>

            <label for="confirmPassword">Confirmar Contraseña:</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required>

            <button type="submit" class="boton boton-registro">Registrarse</button>
        </form>
    </div>

    <script src="BIDA_registro.js"></script>


    



</body>
