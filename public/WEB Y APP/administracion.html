<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administración - BIDA</title>
  <link rel="stylesheet" href="administracion.css">
</head>
<body>
  <header class="app-bar">
    <div class="app-brand">
      <img src="assets/logo-500x500.png" alt="Logo BIDA" class="brand-logo">
      <div>
        <p class="brand-name">BIDA</p>
        <p class="brand-tagline">Odontología Especializada</p>
      </div>
    </div>
    <div class="app-search">
      <input type="text" class="top-search-input" placeholder="Buscar en el sistema...">
    </div>
    <div class="app-actions">
      <button class="pill">Novedades</button>
      <button class="pill ghost" id="btn-logout" type="button">Cerrar sesión</button>
    </div>
  </header>

  <section class="app-subbar">
    <nav class="subbar-menu" aria-label="Accesos rápidos">
      <a class="tab is-active" href="BIDA_agenda.html">Agenda</a>
      <a class="tab" href="../js/productos.html">Productos</a>
      <a class="tab" href="../js/ventas.html">Ventas</a>
    </nav>
  </section>

  <div class="admin-shell">
    <div class="admin-panel">
      
      <main class="admin-content active" id="view-empleados">
        <div class="admin-header">
          <h2>Gestión de Empleados</h2>
          <p>Administra el personal médico y administrativo de la clínica.</p>
        </div>
        <div class="data-table-container">
          <div class="data-table-head head-empleados">
            <span>ID</span>
            <span>Nombre</span>
            <span>Apellido</span>
            <span>Documento</span>
            <span>Rol</span>
            <span>Especialidad</span>
            <span>Teléfono</span>
            <span>Email</span>
            <span>Usuario</span>
          </div>
          <div class="data-table-body" id="tbody-empleados">
             </div>
        </div>
      </main>

    </div>
  </div>

  <script src="administracion.js"></script>
  <script>
    (function(){
      function updateHeaderHeight(){
        var header = document.querySelector('.app-bar');
        if(!header) return;
        var h = header.offsetHeight;
        document.documentElement.style.setProperty('--header-height', h + 'px');
      }
      window.addEventListener('load', updateHeaderHeight);
      window.addEventListener('resize', updateHeaderHeight);
      setTimeout(updateHeaderHeight, 250);
    })();
  </script>
</body>
</html>
