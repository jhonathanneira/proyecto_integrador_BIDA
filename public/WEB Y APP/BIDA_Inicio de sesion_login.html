<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inicio de sesión - BIDA</title>
  <link rel="stylesheet" href="imagenes.css">
  <link rel="stylesheet" href="textos.css">
  <link rel="stylesheet" href="botones.css">
  <style>
    body.login-page {
      margin: 0;
      min-height: 100vh;
      padding: 24px 16px 28px;
      box-sizing: border-box;
      background-image: url('assets/Fondo BIDA.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      gap: 0;
      overflow-y: auto;
    }

    body.login-page .login-shell {
      width: min(100%, 1120px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 18px 0 0;
    }

    body.login-page .form-container {
      text-align: center;
      background-color: rgba(255, 255, 255, 0.8); /* Fondo semi-transparente para mejor legibilidad */
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      width: min(100%, 420px);
      box-sizing: border-box;
    }

    body.login-page form {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
    }

    body.login-page .form-container label {
      text-align: left;
      margin-bottom: 0;
    }

    body.login-page .form-container input,
    body.login-page .form-container button {
      width: 100%;
      max-width: 100%;
    }

    body.login-page .form-container input {
      margin-bottom: 0;
    }

    body.login-page .login-hero {
      width: 100%;
      display: grid;
      gap: 8px;
      text-align: center;
      color: #0f4c75;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.4);
    }

    body.login-page .login-hero .eyebrow {
      margin: 0;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 0.82rem;
      font-weight: 700;
      color: #005792;
    }

    body.login-page .login-hero h1 {
      margin: 0;
      font-size: clamp(1.9rem, 3vw, 3rem);
      line-height: 0.95;
    }

    @media (max-width: 900px) {
      body.login-page {
        padding-bottom: 18px;
      }

      body.login-page .login-shell {
        padding-top: 16px;
        gap: 14px;
      }

      body.login-page .form-container {
        padding: 14px;
      }

      body.login-page label {
        font-size: 1.1rem;
      }

      body.login-page input[type="text"],
      body.login-page input[type="password"],
      body.login-page input[type="email"],
      body.login-page input[type="tel"],
      body.login-page .boton {
        font-size: 1rem;
        padding: 12px;
      }
    }

  </style>
    
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-hero" aria-label="Presentación de acceso">
      <h1>ODONTOLOGÍA<br>ESPECIALIZADA</h1>
    </section>

    <div class="form-container">
      <form id="loginform">
        <label for="username">Usuario o Email:</label>
        <input type="text" id="username" name="username" required>

        <label for="password">Contraseña:</label>
        <input type="password" id="password" name="password" required>

        <p id="mensaje" aria-live="polite"></p>

        <button type="submit" class="boton">Iniciar Sesión</button>
      </form>
    </div>
  </main>

  <script src="BIDA_Inicio de sesion_login.js"></script>

    



    



</body>
