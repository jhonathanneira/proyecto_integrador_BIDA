<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos - BIDA</title>
  <link rel="stylesheet" href="../WEB Y APP/administracion.css">
  <link rel="stylesheet" href="productos.css">
</head>
<body>
  <header class="app-bar">
    <div class="app-brand">
      <img src="../WEB Y APP/assets/logo-500x500.png" alt="Logo BIDA" class="brand-logo">
      <div>
        <p class="brand-name">BIDA</p>
        <script src="../WEB Y APP/administracion.js"></script>
        <script>
          (function(){
            function updateHeaderHeight(){
              var header = document.querySelector('.app-bar');
              if(!header) return;
              var h = header.offsetHeight;
              document.documentElement.style.setProperty('--header-height', h + 'px');
            }
            window.addEventListener('load', updateHeaderHeight);
            window.addEventListener('resize', updateHeaderHeight);
            setTimeout(updateHeaderHeight, 250);
          })();
        </script>
        <p class="brand-tagline">Odontología Especializada</p>
      </div>
    </div>
    <div class="app-search">
      <input type="text" class="top-search-input" placeholder="Buscar en el sistema...">
    </div>
    <div class="app-actions">
      <button class="pill">Novedades</button>
      <button class="pill ghost" id="btn-logout" type="button">Cerrar sesión</button>
    </div>
  </header>

  <section class="app-subbar">
    <nav class="subbar-menu" aria-label="Navegación de módulos">
      <a class="tab" href="../WEB Y APP/BIDA_agenda.html">Agenda</a>
      <a class="tab is-active" href="productos.html">Productos</a>
      <a class="tab" href="ventas.html">Ventas</a>
    </nav>
  </section>

  <section class="app-subbar">
    <div class="subbar-left">
      <span class="subbar-section-title">Inventario de Productos</span>
    </div>
    <div class="subbar-right">
      <button class="toolbar-btn primary" id="btn-nuevo">+ Nuevo Producto</button>
      <button class="toolbar-btn">Exportar</button>
    </div>
  </section>

  <div class="admin-shell">
    <div class="admin-panel">
      <main class="admin-content active" id="view-productos">
        <div class="admin-header">
          <h2>Inventario de Productos</h2>
          <p>Control de insumos y materiales odontológicos.</p>
        </div>
        <div class="data-table-container">
          <div class="data-table-head head-productos">
            <span>ID Producto</span>
            <span>Nombre</span>
            <span>Código de Barras</span>
            <span>Precio Venta</span>
            <span>Precio Compra</span>
            <span>Categoría</span>
            <span>Unidad de Medida</span>
            <span>Fecha de Vencimiento</span>
          </div>
          <div class="data-table-body" id="tbody-productos">
             </div>
        </div>
      </main>
    </div>
  </div>

  <script src="productos.js"></script>
</body>
</html>
